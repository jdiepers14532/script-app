<svg width="100%" viewBox="0 0 680 295" role="img" style="" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Zwei Bereiche: Planung und Drehbuch-Prozess</title><desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Der Bereich Planung umfasst Konzept und Future; der Bereich Drehbuch-Prozess umfasst Storyline und Drehbuch. Die fixierte Endfassung der Planung ist Grundlage für den Drehbuch-Prozess. Jede Stufe durchläuft denselben Zyklus: editieren, besprechen, von der Redaktion abnehmen, als Endfassung fixieren.</desc>
